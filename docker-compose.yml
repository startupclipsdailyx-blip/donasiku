version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: donasiku-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - donasiku-network

  redis:
    image: redis:7-alpine
    container_name: donasiku-redis
    ports:
      - '6379:6379'
    networks:
      - donasiku-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: donasiku-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/donasiku?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - donasiku-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: donasiku-frontend
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - donasiku-network

volumes:
  mongodb_data:

networks:
  donasiku-network:
    driver: bridge